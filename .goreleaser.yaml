version: 2
project_name: mercadolibre-pp-cli
changelog:
  disable: true
builds:
  - id: mercadolibre-pp-cli
    main: ./cmd/mercadolibre-pp-cli
    binary: mercadolibre-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X mercadolibre-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
release:
  github:
    owner: LeaCast
    name: mercadolibre-pp-cli
  draft: false
  prerelease: auto
